<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mimi's Podcast — Voice Auditions</title>
  <style>
    :root { font-family: ui-sans-serif, system-ui, sans-serif; color-scheme: light; }
    body { margin: 0; background: #f8f1e4; color: #142650; }
    main { width: min(92%, 760px); margin: 0 auto; padding: 42px 0 72px; }
    h1 { margin-bottom: 8px; }
    .intro { max-width: 65ch; line-height: 1.6; }
    .voice { margin: 24px 0; padding: 22px; background: #fffaf2; border: 1px solid #d8c6a4; border-radius: 16px; }
    .voice h2 { margin: 0 0 6px; }
    audio { width: 100%; margin-top: 12px; }
    a { color: #17386f; }
  </style>
</head>
<body>
  <main>
    <h1>Mimi's Podcast — Voice Auditions</h1>
    <p class="intro">Morning BriefとDebt Deskで使っているKokoro-82Mエンジンの、日本語女性音声4種類です。全候補が同じ原稿、同じ速度、同じ音量処理を使っています。</p>

    <section class="voice">
      <h2>A — jf_alpha</h2>
      <audio controls preload="metadata" src="voice-tests/jf_alpha.mp3"></audio>
    </section>

    <section class="voice">
      <h2>B — jf_gongitsune</h2>
      <audio controls preload="metadata" src="voice-tests/jf_gongitsune.mp3"></audio>
    </section>

    <section class="voice">
      <h2>C — jf_nezumi</h2>
      <audio controls preload="metadata" src="voice-tests/jf_nezumi.mp3"></audio>
    </section>

    <section class="voice">
      <h2>D — jf_tebukuro</h2>
      <audio controls preload="metadata" src="voice-tests/jf_tebukuro.mp3"></audio>
    </section>

    <p>好みの文字を、A、B、C、Dのどれかでお知らせください。</p>
    <p><a href="./">番組ページへ戻る</a></p>
  </main>
</body>
</html>
